<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}TurnoYa{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'app:home' %}">TurnoYa</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
        aria-controls="navMenu" aria-expanded="false" aria-label="Alternar navegación">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'app:home' %}">Inicio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'app:lista_medicos' %}">Médicos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'app:lista_pacientes' %}">Pacientes</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'app:nuevo_turno' %}">Solicitar Turno</a>
          </li>
          {% endif %}

        </ul>

        <div class="d-flex align-items-center gap-2">
          {% if user.is_authenticated %}
          <span class="text-white-50 small">Hola, {{ user.username }}</span>
          <form method="post" action="{% url 'app:logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">Salir</button>
          </form>
          {% else %}
          <a class="btn btn-outline-light btn-sm" href="{% url 'app:login' %}">Ingresar</a>
          <a class="btn btn-light btn-sm" href="{% url 'app:registro' %}">Registro</a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="bg-light text-center text-muted py-3 mt-5 border-top">
    <small>TurnoYa 2026</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
