{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header text-white" style="background-color: #4a90e2;">
                    <h4 class="mb-0">Iniciar Sesión</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">{{ field.label }}</label>
                                <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" class="form-control" required id="id_{{ field.name }}">
                                {% if field.errors %}
                                    <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                                {% endif %}
                            </div>
                        {% endfor %}
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn text-white" style="background-color: #4a90e2;">Ingresar</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center">
                    <small>¿No tienes cuenta? <a href="{% url 'app:registro' %}" style="color: #4a90e2; font-weight: bold; text-decoration: none;">Regístrate aquí</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
