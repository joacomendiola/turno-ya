{% extends "base.html" %}
{% block title %}Registro de Paciente — TurnoYa{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">Registro de nuevo paciente</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-success w-100">Registrarse</button>
    </form>
  </div>
</div>
{% endblock %}
