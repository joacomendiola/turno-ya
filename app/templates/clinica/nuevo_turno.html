{% extends "base.html" %}
{% block title %}Nuevo Turno — TurnoYa{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <h2 class="mb-4">Solicitar un nuevo turno</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Confirmar Solicitud</button>
    </form>
  </div>
</div>
{% endblock %}
