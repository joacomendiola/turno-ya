{% extends "base.html" %}
{% block title %}Nuevo Turno — TurnoYa{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Solicitar un nuevo turno</h4>
        </div>
        <div class="card-body">
            <form method="post">
              {% csrf_token %}
              {% for field in form %}
                  <div class="mb-3">
                      <label class="form-label fw-bold">{{ field.label }}</label>
                      {{ field }}
                      {% if field.errors %}
                          <div class="text-danger small">{{ field.errors|striptags }}</div>
                      {% endif %}
                  </div>
              {% endfor %}
              <div class="d-grid mt-4">
                  <button type="submit" class="btn btn-primary">Confirmar Solicitud</button>
                  <a href="{% url 'app:lista_turnos' %}" class="btn btn-link">Cancelar</a>
              </div>
            </form>
        </div>
    </div>
  </div>
</div>
{% endblock %}
