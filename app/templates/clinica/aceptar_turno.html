{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card border-success mx-auto" style="max-width: 500px;">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Confirmar Turno</h4>
        </div>
        <div class="card-body text-center">
            <p class="lead">¿Estás seguro que deseas confirmar el turno del paciente <strong>{{ turno.paciente.nombre }} {{ turno.paciente.apellido }}</strong>?</p>
            <p>Fecha y hora: {{ turno.fecha_hora|date:"d/m/Y H:i" }}</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                    <a href="{% url 'app:lista_turnos' %}" class="btn btn-secondary">Volver</a>
                    <button type="submit" class="btn btn-success">Sí, aceptar turno</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
